services:
  - type: web
    name: tokona-erp
    env: php
    plan: free
    buildCommand: "composer update --no-dev --optimize-autoloader && npm install --no-package-lock && npm run build && php artisan cache:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force"
    startCommand: "apache2-foreground"
    # Render otomatis menggunakan Apache. Kita atur dokumen root ke folder public Laravel.
    envVars:
      - key: APP_NAME
        value: Tokona
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: WEB_DOCUMENT_ROOT
        value: public
      - key: DB_CONNECTION
        value: pgsql
      # Menggunakan Pooler host agar lebih stabil di Neon Serverless
      - key: DB_HOST
        value: ep-icy-term-aotunhqo-pooler.c-2.ap-southeast-1.aws.neon.tech
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: neondb
      - key: DB_USERNAME
        value: neondb_owner
      - key: DB_PASSWORD
        sync: false # Jangan simpan password di file ini, masukkan manual di dashboard Render
      - key: SESSION_SECURE_COOKIE
        value: true
